name: C/C++ CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake freeglut3-dev libglu1-mesa-dev

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build
